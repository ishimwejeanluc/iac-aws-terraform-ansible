---
- name: Configure web server
  hosts: web
  become: true
  gather_facts: false
  pre_tasks:
    - name: Ensure Python 3.8 is installed
      ansible.builtin.raw: |
        if ! command -v python3.8 >/dev/null 2>&1; then
          sudo amazon-linux-extras enable python3.8 >/dev/null 2>&1 || true
          sudo yum -y install python38
        fi
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

  tasks:
    - name: Enable nginx via amazon-linux-extras
      ansible.builtin.command: amazon-linux-extras enable nginx1
      changed_when: false

    - name: Install Nginx
      ansible.builtin.command: yum -y install nginx
      register: nginx_install
      changed_when: "'Nothing to do' not in nginx_install.stdout"

    - name: Check if Nginx web root exists
      ansible.builtin.stat:
        path: /usr/share/nginx/html
      register: nginx_web_root

    - name: Create Nginx web root if missing
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: directory
        mode: "0755"
      when: not nginx_web_root.stat.exists

    - name: Deploy web app
      ansible.builtin.copy:
        src: index.html
        dest: /usr/share/nginx/html/index.html
        mode: "0644"
      notify: Restart Nginx

    - name: Ensure Nginx is running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Wait for Nginx to be available
      ansible.builtin.wait_for:
        port: 80
        delay: 2
        timeout: 60

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
